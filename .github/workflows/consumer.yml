name: Consumer Pact Pipeline

on:
  push:
    paths:
      - 'pos/**'
      - '.github/workflows/consumer.yml'
  pull_request:
    paths:
      - 'pos/**'
      - '.github/workflows/consumer.yml'

jobs:
  consumer-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Debug Repository
        run: |
          pwd
          echo "---------------- ROOT ----------------"
          ls -la
          echo "---------------- ALL FILES ----------------"
          find . -maxdepth 3

      - name: Run Consumer Tests
        run: mvn -pl pos test

      - name: Publish Pact
        if: success()
        run: mvn -pl pos pact:publish

      - name: Can I Deploy
        if: success()
        run: mvn -pl pos pact:can-i-deploy