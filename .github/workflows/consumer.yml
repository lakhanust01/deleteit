name: Consumer Pact Pipeline

on:
  push:
    paths:
      - 'sat-assessment2706/pos/**'
      - '.github/workflows/consumer.yml'
  pull_request:
    paths:
      - 'sat-assessment2706/pos/**'
      - '.github/workflows/consumer.yml'

jobs:
  consumer-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Consumer Tests
        run: mvn -f sat-assessment2706/pom.xml -pl pos test

      - name: Publish Pact
        run: mvn -f sat-assessment2706/pom.xml -pl pos pact:publish

      - name: Can I Deploy
        run: mvn -f sat-assessment2706/pom.xml -pl pos pact:can-i-deploy