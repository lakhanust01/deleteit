name: Consumer Pact Pipeline

on:
  push:
    paths:
      - 'sat-assesment2706/pos/**'
      - '.github/workflows/consumer.yml'
  pull_request:
    paths:
      - 'sat-assesment2706/pos/**'
      - '.github/workflows/consumer.yml'

jobs:
  consumer-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Repository Structure
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -type f -name "pom.xml"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Consumer Tests
        run: mvn -f sat-assesment2706/pom.xml -pl pos test

      - name: Publish Pact
        if: success()
        run: mvn -f sat-assesment2706/pom.xml -pl pos pact:publish

      - name: Can I Deploy
        if: success()
        run: >
          mvn -f sat-assesment2706/pom.xml
          -pl pos
          pact:can-i-deploy
          -Dpacticipant=pos
          -Dversion=1.0-SNAPSHOT